  <path d="M115 180 L103 192 L138 192 L150 180 Z" fill="rgba(255,255,255,0.6)"/>
  <path d="M62 192 L97 192 L97 142 L88 130 L85 130 L85 180 L50 180 L62 192 Z" fill="rgba(255,255,255,0.35)"/>
  <path d="M103 192 L138 192 L150 180 L115 180 L115 130 L112 130 L103 142 L103 192 Z" fill="rgba(255,255,255,0.35)"/>
  <!-- Dark accent for 3D depth on M -->
  <path d="M85 130 L100 150 L100 108 L85 90 L85 130 Z" fill="#9F1239" opacity="0.5"/>
  <path d="M115 130 L100 150 L100 108 L115 90 L115 130 Z" fill="#9F1239" opacity="0.3"/>
