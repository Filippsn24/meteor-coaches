        fill="white"/>
  <!-- Shield inner (bordeaux fill) -->
  <path d="M22 42 L22 148 L100 216 L178 148 L178 42 Z"
        fill="#9F1239"/>
  <!-- 3D Block M - white -->
  <!-- Back face of the M block -->
  <path d="M50 75 L50 180 L85 180 L85 130 L100 150 L115 130 L115 180 L150 180 L150 75 L122 75 L100 102 L78 75 Z"
        fill="white"/>
